<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image to 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0a0b;
      --surface:   #111114;
      --border:    #222228;
      --border-hi: #3a3a48;
      --accent:    #7c6af7;
      --accent-lo: #7c6af720;
      --accent-hi: #a89bff;
      --text:      #e2e2ec;
      --muted:     #6b6b82;
      --ok:        #4ade80;
      --err:       #f87171;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Barlow', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 400;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
    }

    .logo {
      font-family: var(--mono);
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: var(--accent-hi);
    }

    .logo span { color: var(--muted); }

    #device-badge {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 2px;
      letter-spacing: 0.08em;
    }

    #device-badge.gpu { color: var(--ok); border-color: var(--ok); }

    /* ── Layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      max-height: calc(100vh - 56px);
    }

    /* ── Left Panel ── */
    .panel-left {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .section {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* ── Drop Zone ── */
    #drop-zone {
      border: 1px dashed var(--border-hi);
      border-radius: 4px;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
      background: var(--surface);
    }

    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-lo);
    }

    #drop-zone .drop-icon {
      font-size: 2rem;
      opacity: 0.3;
    }

    #drop-zone .drop-text {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    #drop-zone .drop-hint {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--border-hi);
    }

    #preview-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    #sanitized-preview {
      display: none;
      margin-top: 0.9rem;
      border: 1px solid var(--border);
      background: #0d0d10;
      border-radius: 4px;
      overflow: hidden;
    }

    #sanitized-preview.visible { display: block; }

    #sanitized-preview .preview-title {
      font-family: var(--mono);
      font-size: 0.64rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      padding: 0.55rem 0.7rem;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
    }

    #sanitized-img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      background:
        linear-gradient(45deg, #17171c 25%, transparent 25%),
        linear-gradient(-45deg, #17171c 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #17171c 75%),
        linear-gradient(-45deg, transparent 75%, #17171c 75%);
      background-color: #101014;
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    }

    /* ── Settings ── */
    .field {
      margin-bottom: 1.25rem;
    }

    .field:last-child { margin-bottom: 0; }

    .field label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .field label span {
      font-family: var(--mono);
      color: var(--accent-hi);
    }

    .slider {
      -webkit-appearance: none;
      width: 100%;
      height: 2px;
      background: var(--border-hi);
      outline: none;
      border-radius: 1px;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg);
      transition: transform 0.15s;
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    .seg-control {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .seg-control button {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 0.78rem;
      padding: 0.4rem 0;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .seg-control button.active {
      background: var(--accent);
      color: #fff;
    }

    .preset-meta {
      margin-top: 0.55rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
    }

    .advanced-options {
      margin-top: 1.15rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .advanced-options summary {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .advanced-options .advanced-hint {
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.45;
      margin: 0.75rem 0 1rem;
    }

    /* ── Generate Button ── */
    #generate-btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      margin-top: 0.25rem;
    }

    #generate-btn:hover:not(:disabled) { background: var(--accent-hi); }
    #generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Progress ── */
    #progress-wrap {
      display: none;
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    #progress-wrap.visible { display: block; }

    #progress-bar-outer {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 0.6rem;
    }

    #progress-bar-inner {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.4s ease;
    }

    #progress-step {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* ── Right Panel: Viewer ── */
    .panel-right {
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--surface);
    }

    #viewer-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #viewer-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      color: var(--muted);
    }

    #viewer-placeholder .ph-icon {
      font-size: 3.5rem;
      opacity: 0.15;
    }

    #viewer-placeholder p {
      font-size: 0.8rem;
      opacity: 0.5;
    }

    #model-viewer {
      width: 100%;
      height: 100%;
      display: none;
    }

    /* ── Toolbar ── */
    .viewer-toolbar {
      border-top: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .viewer-toolbar .info {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }

    #download-btn {
      padding: 0.45rem 1.25rem;
      background: none;
      border: 1px solid var(--border-hi);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      display: none;
    }

    #download-btn:hover { border-color: var(--accent); color: var(--accent-hi); }
    #download-btn.visible { display: inline-block; }

    /* ── Error toast ── */
    #error-toast {
      display: none;
      padding: 1rem 1.5rem;
      background: #1a0a0a;
      border-top: 1px solid var(--err);
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--err);
      white-space: pre-wrap;
      max-height: 120px;
      overflow-y: auto;
    }

    #error-toast.visible { display: block; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    input[type="file"] { display: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">IMAGE<span>_TO_</span>3D</div>
  <div id="device-badge">LOADING...</div>
</header>

<main>
  <!-- Left Panel -->
  <div class="panel-left">

    <div class="section">
      <div class="section-label">Input Image</div>
      <div id="drop-zone">
        <div class="drop-icon">⬡</div>
        <div class="drop-text">Drop image here<br/>or click to browse</div>
        <div class="drop-hint">PNG · JPG · WEBP</div>
        <img id="preview-img" alt="preview" />
      </div>
      <input type="file" id="file-input" accept="image/*" />
      <div id="sanitized-preview">
        <div class="preview-title">Sanitized model input</div>
        <img id="sanitized-img" alt="sanitized preview" />
      </div>
    </div>

    <div class="section">
      <div class="section-label">Options</div>

      <div class="field">
        <label>Generation Preset <span id="preset-label">Balanced</span></label>
        <div class="seg-control">
          <button data-preset="fast">Fast</button>
          <button class="active" data-preset="balanced">Balanced</button>
          <button data-preset="high">High</button>
        </div>
        <div class="preset-meta" id="preset-meta">Resolution 256 · threshold 25</div>
      </div>

      <details id="advanced-options" class="advanced-options">
        <summary>Advanced override</summary>
        <p class="advanced-hint">
          Changing this value overrides the preset threshold for the next job.
        </p>
        <div class="field">
          <label>Surface Threshold <span id="thresh-label">25</span></label>
          <input type="range" class="slider" id="thresh-slider"
                 min="5" max="60" value="25" step="1" />
        </div>
      </details>
    </div>

    <div id="progress-wrap">
      <div id="progress-bar-outer">
        <div id="progress-bar-inner"></div>
      </div>
      <div id="progress-step">Initializing...</div>
    </div>

    <div class="section">
      <button id="generate-btn" disabled>GENERATE 3D MODEL</button>
    </div>

  </div>

  <!-- Right Panel -->
  <div class="panel-right">
    <div id="viewer-wrap">
      <div id="viewer-placeholder">
        <div class="ph-icon">⬡</div>
        <p>3D model will appear here</p>
      </div>
      <model-viewer
        id="model-viewer"
        camera-controls
        camera-orbit="0deg 75deg 105%"
        field-of-view="35deg"
        interaction-prompt="none"
        shadow-intensity="0.25"
        environment-image="neutral"
        exposure="0.95"
      ></model-viewer>
    </div>

    <div id="error-toast"></div>

    <div class="viewer-toolbar">
      <div class="info" id="status-info">Ready</div>
      <button id="download-btn">DOWNLOAD GLB</button>
    </div>
  </div>
</main>

<!-- model-viewer web component -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

<script>
  // ── State ──
  let selectedFile = null;
  let currentJobId = null;
  let pollInterval = null;
  let currentFilename = null;
  let currentPreview = null;
  let preset = 'balanced';
  let resolution = 256;
  let advancedMode = false;

  const PRESETS = {
    fast:     { label: 'Fast',     resolution: 128, threshold: 28 },
    balanced: { label: 'Balanced', resolution: 256, threshold: 25 },
    high:     { label: 'High',     resolution: 320, threshold: 22 },
  };

  // ── Elements ──
  const dropZone     = document.getElementById('drop-zone');
  const fileInput    = document.getElementById('file-input');
  const previewImg   = document.getElementById('preview-img');
  const sanitizedWrap = document.getElementById('sanitized-preview');
  const sanitizedImg = document.getElementById('sanitized-img');
  const presetLabel  = document.getElementById('preset-label');
  const presetMeta   = document.getElementById('preset-meta');
  const generateBtn  = document.getElementById('generate-btn');
  const progressWrap = document.getElementById('progress-wrap');
  const progressBar  = document.getElementById('progress-bar-inner');
  const progressStep = document.getElementById('progress-step');
  const modelViewer  = document.getElementById('model-viewer');
  const placeholder  = document.getElementById('viewer-placeholder');
  const downloadBtn  = document.getElementById('download-btn');
  const errorToast   = document.getElementById('error-toast');
  const statusInfo   = document.getElementById('status-info');
  const deviceBadge  = document.getElementById('device-badge');
  const advancedOptions = document.getElementById('advanced-options');

  // ── Device info ──
  fetch('/api/device')
    .then(r => r.json())
    .then(d => {
      deviceBadge.textContent = d.device;
      if (d.device !== 'CPU (fallback)' && d.device !== 'CPU') {
        deviceBadge.classList.add('gpu');
      }
    })
    .catch(() => {});

  // ── Preset control ──
  document.querySelectorAll('.seg-control button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.seg-control button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      setPreset(btn.dataset.preset);
    });
  });

  // ── Threshold slider ──
  const threshSlider = document.getElementById('thresh-slider');
  threshSlider.addEventListener('input', () => {
    advancedMode = true;
    document.getElementById('thresh-label').textContent = threshSlider.value;
    updatePresetLabels();
  });

  function setPreset(nextPreset) {
    preset = nextPreset;
    const config = PRESETS[preset];
    resolution = config.resolution;
    advancedMode = false;
    threshSlider.value = config.threshold;
    document.getElementById('thresh-label').textContent = config.threshold;
    advancedOptions.removeAttribute('open');
    updatePresetLabels();
  }

  function updatePresetLabels() {
    const config = PRESETS[preset];
    presetLabel.textContent = advancedMode
      ? `${config.label} + custom`
      : config.label;
    presetMeta.textContent = `Resolution ${resolution} · threshold ${threshSlider.value}`;
  }

  // ── Drop Zone ──
  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  function loadFile(file) {
    selectedFile = file;
    const url = URL.createObjectURL(file);
    previewImg.src = url;
    previewImg.style.display = 'block';
    sanitizedWrap.classList.remove('visible');
    sanitizedImg.removeAttribute('src');
    currentPreview = null;
    currentFilename = null;
    downloadBtn.classList.remove('visible');
    generateBtn.disabled = false;
    clearError();
  }

  // ── Generate ──
  generateBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    clearError();
    setGenerating(true);

    const form = new FormData();
    form.append('image', selectedFile);
    form.append('preset', preset);
    form.append('advanced', advancedMode);
    form.append('resolution', resolution);
    form.append('mc_threshold', threshSlider.value);

    try {
      const res = await fetch('/api/generate', { method: 'POST', body: form });
      if (!res.ok) {
        throw new Error(await apiErrorMessage(res));
      }
      const data = await res.json();
      currentJobId = data.job_id;
      startPolling();
    } catch (err) {
      showError(err.message);
      setGenerating(false);
    }
  });

  function startPolling() {
    if (pollInterval) clearInterval(pollInterval);
    pollInterval = setInterval(pollStatus, 800);
  }

  async function pollStatus() {
    if (!currentJobId) return;
    try {
      const res  = await fetch(`/api/status/${currentJobId}`);
      const data = await res.json();

      updateProgress(data.progress, data.step);
      statusInfo.textContent = `${data.progress}% — ${data.step || data.status}`;

      if (data.preview && data.preview !== currentPreview) {
        showSanitizedPreview(data.preview, data.diagnostics?.preprocess);
      }

      if (data.status === 'done') {
        clearInterval(pollInterval);
        setGenerating(false);
        currentFilename = data.output;
        showModel(`/api/download/${data.output}`);
        statusInfo.textContent = doneStatusText(data);
      } else if (data.status === 'error') {
        clearInterval(pollInterval);
        setGenerating(false);
        showError(data.error || 'Generation failed');
      }
    } catch (e) {
      console.error(e);
    }
  }

  function updateProgress(pct, step) {
    progressBar.style.width = `${pct}%`;
    progressStep.textContent = step || '';
  }

  function setGenerating(active) {
    generateBtn.disabled = active;
    generateBtn.textContent = active ? 'GENERATING...' : 'GENERATE 3D MODEL';
    progressWrap.classList.toggle('visible', active);
    if (!active) updateProgress(0, '');
  }

  function showModel(url) {
    placeholder.style.display = 'none';
    modelViewer.style.display = 'block';
    modelViewer.src = url;
    downloadBtn.classList.add('visible');
    statusInfo.textContent = 'Done — model ready';
  }

  function showSanitizedPreview(filename, diagnostics) {
    currentPreview = filename;
    sanitizedImg.src = `/api/preview/${filename}`;
    sanitizedWrap.classList.add('visible');

    const warnings = diagnostics?.warnings || [];
    if (warnings.length > 0) {
      statusInfo.textContent = `Input sanitized — ${warnings.join(', ')}`;
    }
  }

  function doneStatusText(data) {
    const mesh = data.diagnostics?.mesh;
    const output = data.diagnostics?.output;
    if (!mesh || !output) return 'Done — model ready';

    const faces = Intl.NumberFormat().format(mesh.faces || 0);
    const mb = ((output.file_size_bytes || 0) / 1024 / 1024).toFixed(1);
    return `Done — ${faces} faces · ${mb} MB`;
  }

  function showError(msg) {
    errorToast.textContent = msg;
    errorToast.classList.add('visible');
    statusInfo.textContent = 'Error';
  }

  function clearError() {
    errorToast.classList.remove('visible');
    errorToast.textContent = '';
  }

  async function apiErrorMessage(response) {
    try {
      const err = await response.json();
      if (typeof err.detail === 'string') return err.detail;
      if (err.detail?.message) return err.detail.message;
    } catch (e) {
      console.error(e);
    }
    return `Server error (${response.status})`;
  }

  // ── Download ──
  downloadBtn.addEventListener('click', () => {
    if (!currentFilename) return;
    const a = document.createElement('a');
    a.href = `/api/download/${currentFilename}`;
    a.download = currentFilename;
    a.click();
  });
</script>
</body>
</html>
